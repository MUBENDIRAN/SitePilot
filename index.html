<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Dynamic Portfolio</title>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Portfolio</h1>
        <ul id="icon-list"></ul>
    </div>

    <script>
        const icons = [
            { name: 'Projects', icon: 'fas fa-project-diagram' },
            { name: 'About', icon: 'fas fa-user' },
            { name: 'Contact', icon: 'fas fa-envelope' }
        ];

        const iconList = document.getElementById('icon-list');

        icons.forEach(icon => {
            const li = document.createElement('li');
            const i = document.createElement('i');
            i.className = `fas ${icon.icon}`;
            li.appendChild(i);
            li.appendChild(document.createTextNode(` ${icon.name}`));
            iconList.appendChild(li);
        });
    </script>
</body>
</html>
